name: Update Contributors

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  update-contributors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: develop

      - name: Regenerate contributors in README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all human contributors, build avatar link for each
          AVATARS=""
          while IFS= read -r login; do
            AVATARS="${AVATARS}<a href=\"https://github.com/${login}\"><img src=\"https://github.com/${login}.png\" width=\"48\" height=\"48\" alt=\"${login}\" title=\"${login}\"/></a>\n"
          done < <(gh api repos/APRILDAY23/IVAO-Sector-File-Creator/contributors \
            --paginate \
            --jq '.[] | select(.type == "User") | .login')

          # Replace everything between the markers
          python3 -c "
          import re, sys

          with open('README.md', 'r') as f:
              content = f.read()

          avatars = sys.argv[1]
          replacement = '<!-- CONTRIBUTORS-START -->\n' + avatars + '<!-- CONTRIBUTORS-END -->'
          new = re.sub(r'<!-- CONTRIBUTORS-START -->.*?<!-- CONTRIBUTORS-END -->', replacement, content, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(new)
          " "$AVATARS"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update contributors"
          git push
